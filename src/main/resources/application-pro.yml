bootdo:
  uploadPath: /var/uploaded_files/
logging:
  level:
    root: error
    com.bootdo: info
spring:
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driverClassName: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://127.0.0.1:3306/bootdo?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: root
    initialSize: 1
    minIdle: 3
    maxActive: 20
    # 配置获取连接等待超时的时间
    maxWait: 60000
    # 配置间隔多久才进行一次检测，检测需要关闭的空闲连接，单位是毫秒
    timeBetweenEvictionRunsMillis: 60000
    # 配置一个连接在池中最小生存的时间，单位是毫秒
    minEvictableIdleTimeMillis: 30000
    validationQuery: select 'x'
    testWhileIdle: true
    testOnBorrow: false
    testOnReturn: false
    # 打开PSCache，并且指定每个连接上PSCache的大小
    poolPreparedStatements: true
    maxPoolPreparedStatementPerConnectionSize: 20
    # 配置监控统计拦截的filters，去掉后监控界面sql无法统计，'wall'用于防火墙
    filters: stat,wall,slf4j
    # 通过connectProperties属性来打开mergeSql功能；慢SQL记录
    connectionProperties: druid.stat.mergeSql=true;druid.stat.slowSqlMillis=5000
    # 合并多个DruidDataSource的监控数据
    #useGlobalDataSourceStat: true
  redis:
      host: localhost
      port: 6379
      password:
      # 连接超时时间（毫秒）
      timeout: 10000
      pool:
        # 连接池中的最大空闲连接
        max-idle: 8
        # 连接池中的最小空闲连接
        min-idle: 10
        # 连接池最大连接数（使用负值表示没有限制）
        max-active: 100
        # 连接池最大阻塞等待时间（使用负值表示没有限制）
        max-wait: -1

ai:
  enabled: true
  # 可选：配置后要求客户端带 Authorization: Bearer <gatewayToken>
  gatewayToken:
  connectTimeoutMs: 15000
  readTimeoutMs: 600000
  glm:
    baseUrl: https://open.bigmodel.cn/api/paas/v4
    # 临时固定 key（按你的要求）；后续建议改回环境变量
    apiKey: 45cfef5dea844f3e88116d202dcdda07.h0CAEbeWmhVxF9FI
    model: glm-5.1
    imageModel: glm-image
    videoModel: cogvideox-3
    videoQuality: quality
    videoWithAudio: true
    videoSize: 1920x1080
    videoFps: 30
    videoPollIntervalMs: 5000
    videoPollTimeoutMs: 600000
    imageSize: 1280x1280
    imageQuality: hd
    imageWatermarkEnabled: false
    # 动态聊天上游配置：兼容老字段 data.apiKey，也支持：
    # data.aiProvider / data.aiBaseUrl / data.aiApiKey / data.aiModel
    apiInfoUrl: https://www.cjym123.cn/api/info
    # 每 2 分钟拉取一次；只有 key 变化时才会更新内存缓存
    apiKeyRefreshMs: 120000
    # 拉取 /api/info 的超时建议设置短一些，避免卡住刷新线程
    apiInfoConnectTimeoutMs: 2000
    apiInfoReadTimeoutMs: 3000
