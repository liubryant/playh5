<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="format-detection" content="telephone=no,email=no,address=no" />
  <title>语音交互-唤醒方式</title>
  <style>
    @font-face {
      font-family: 'MiSans';
      font-style: normal;
      font-weight: 400;
      font-display: swap;
      src: local('MiSans'),
           url('./fonts/MiSans-Regular.woff2') format('woff2'),
           url('./fonts/MiSans-Regular.woff') format('woff'),
           url('./fonts/MiSans-Regular.ttf') format('truetype');
    }
    @font-face {
      font-family: 'MiSans';
      font-style: normal;
      font-weight: 500;
      font-display: swap;
      src: local('MiSans Medium'), local('MiSans-Medium'),
           url('./fonts/MiSans-Medium.woff2') format('woff2'),
           url('./fonts/MiSans-Medium.woff') format('woff'),
           url('./fonts/MiSans-Medium.ttf') format('truetype');
    }

    :root {
      --page-bg: #000;
      --card-bg: #f6f6f6;
      --card-radius: 56px;
      --text-main: #000;
      --text-sub: #666;
      --circle: #3978f3;
    }

    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
      background: var(--page-bg);
      overflow: hidden;
      font-family: MiSans, system-ui, -apple-system, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif;
    }

    .page {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }

    /* 固定 1920×1080 画布，外面 JS 等比缩放 */
    .canvas {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 1920px;
      height: 1080px;
      transform-origin: center center;
    }

    /* f6f6f6 卡片容器：1840×1000，圆角 56，渐变描边 */
    .panel {
      position: absolute;
      inset: 40px;
      border-radius: var(--card-radius);
      background: var(--card-bg);
      overflow: hidden;
      box-sizing: border-box;
      border: 2px solid rgba(255, 255, 255, 0.25);
      backdrop-filter: blur(180px);
      -webkit-backdrop-filter: blur(180px);
    }

    .panel::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      padding: 2px;
      background: linear-gradient(
        178deg,
        rgba(255, 255, 255, 0.6) 0%,
        rgba(255, 255, 255, 0) 41%,
        rgba(255, 255, 255, 0) 58%,
        rgba(255, 255, 255, 0.1) 100%
      );
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      mask-composite: exclude;
      pointer-events: none;
    }

    /* 标题：相对 panel 顶 40，居中 */
    .title {
      position: absolute;
      left: 0;
      top: 40px;
      width: 1840px;
      height: 52px;
      font-size: 40px;
      line-height: 52px;
      font-weight: 500;
      text-align: center;
      color: var(--text-main);
    }

    /* 卡片行：相对 panel left 80, top 188；4 列 402，间距 24 */
    .cards-row {
      position: absolute;
      left: 80px;
      top: 188px;
      width: 1680px;
      height: 580px;
      display: flex;
      gap: 24px;
    }

    .card {
      width: 402px;
      height: 580px;
      background: #fff;
      border: 1px solid rgba(0, 0, 0, 0.05);
      border-radius: 48px;
      box-shadow: 0 8px 40.9px -12px rgba(0, 0, 0, 0.02);
      position: relative;
      overflow: hidden;
      flex: 0 0 auto;
    }

    .card-title {
      position: absolute;
      left: 40px;
      top: 48px;
      font-size: 36px;
      line-height: 1.3;
      font-weight: 500;
      color: var(--text-main);
      white-space: nowrap;
      margin: 0;
    }

    .card-desc {
      position: absolute;
      left: 40px;
      top: 103px;
      font-size: 24px;
      line-height: 1.3;
      font-weight: 400;
      color: var(--text-sub);
      margin: 0;
    }
    .card-desc.nowrap { white-space: nowrap; }
    .card-desc.wrap   { width: 322px; white-space: normal; }

    .card img,
    .panel img {
      -webkit-user-drag: none;
      user-select: none;
      pointer-events: none;
    }

    /* —— 卡 1：语音唤醒 —— 底部插图 348×127 */
    .card-voice .voice-img {
      position: absolute;
      left: 27px;
      top: 271px;
      width: 348px;
      height: 127px;
      object-fit: contain;
      object-position: center top;
    }

    /* —— 卡 2：INMO Controller —— 插图 187×320 */
    .card-controller .ctrl-img {
      position: absolute;
      left: 95px;
      top: 179px;
      width: 187px;
      height: 320px;
      object-fit: contain;
      object-position: center bottom;
    }

    /* —— 卡 3：Touchpad 1.0 —— 插图 187×320 + 主页键圆圈 */
    .card-tp .tp-img {
      position: absolute;
      left: 107px;
      top: 189px;
      width: 187px;
      height: 320px;
      object-fit: contain;
      object-position: center bottom;
    }
    .card-tp .tp-circle {
      position: absolute;
      left: 200px;
      top: 429px;
      width: 66px;
      height: 66px;
      border: 3px solid var(--circle);
      border-radius: 50%;
      box-sizing: border-box;
    }

    /* —— 卡 4：戒指 —— 插图 209×267 + 圆圈 + 箭头（相对卡） */
    .card-ring .ring-img {
      position: absolute;
      left: 94px;
      top: 215px;
      width: 209px;
      height: 267px;
      object-fit: cover;
      object-position: center center;
    }
    .card-ring .ring-circle {
      position: absolute;
      left: 248px;
      top: 377px;
      width: 66px;
      height: 66px;
      border: 3px solid var(--circle);
      border-radius: 50%;
      box-sizing: border-box;
    }
    .card-ring .ring-arrow {
      position: absolute;
      left: 319px;
      top: 443.53px;
      width: 95.916px;
      height: 94.625px;
      object-fit: contain;
    }

    /* ===== 跨卡浮动元素（panel-relative）=====
       用户给的坐标都基于 1920×1080 大画框，panel 在 (40,40)，
       所以 panel-relative = canvas坐标 - 40 */

    /* F1.2.2 箭头：panel-relative (左 721, 上 639.53) */
    .frame-arrow-2 {
      position: absolute;
      left: 721px;
      top: 639.53px;
      width: 95.916px;
      height: 94.625px;
      object-fit: contain;
    }
    /* F1.2.3 圆圈：panel-relative (左 664, 上 584) */
    .frame-circle-2 {
      position: absolute;
      left: 664px;
      top: 584px;
      width: 66px;
      height: 66px;
      border: 3px solid var(--circle);
      border-radius: 50%;
      box-sizing: border-box;
    }
    /* F1.3.3 箭头：移到 tp-circle 旁，朝左上方指圆圈 */
    .frame-arrow-3 {
      position: absolute;
      left: 1214px;
      top: 642.53px;
      width: 95.916px;
      height: 94.625px;
      object-fit: contain;
    }

    /* 底部导航指示器：panel-relative top 952，左右居中 */
    .bottom-nav {
      position: absolute;
      left: 0;
      top: 952px;
      width: 1840px;
      height: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .nav-dot {
      width: 84px;
      height: 8px;
      background: rgba(0, 0, 0, 0.3);
      border-radius: 999px;
    }
  </style>
</head>
<body>

  <div class="page" id="viewport">
    <div class="canvas" id="canvas" aria-label="语音交互-唤醒方式">
      <div class="panel">

        <div class="title">语音交互-唤醒方式</div>

        <div class="cards-row">

          <!-- 卡 1：语音唤醒 -->
          <div class="card card-voice">
            <p class="card-title">语音唤醒</p>
            <p class="card-desc wrap">连接网络后，语音说出"阿目同学"唤醒</p>
            <img class="voice-img" src="./images/F1.1.1-语音唤醒.png" alt="语音唤醒">
          </div>

          <!-- 卡 2：INMO Controller -->
          <div class="card card-controller">
            <p class="card-title">INMO Controller</p>
            <p class="card-desc nowrap">长按OK键</p>
            <img class="ctrl-img" src="./images/F1.2.1-Touchpad 1.0.png" alt="INMO Controller">
          </div>

          <!-- 卡 3：Touchpad 1.0 -->
          <div class="card card-tp">
            <p class="card-title">Touchpad 1.0</p>
            <p class="card-desc nowrap">长按主页键</p>
            <img class="tp-img" src="./images/F1.3.1-Touchpad 1.0.png" alt="Touchpad 1.0">
            <div class="tp-circle"></div>
          </div>

          <!-- 卡 4：戒指 -->
          <div class="card card-ring">
            <p class="card-title">戒指</p>
            <p class="card-desc nowrap">连续点击两次功能键</p>
            <img class="ring-img" src="./images/F1.4.1-戒指.png" alt="戒指">
            <div class="ring-circle"></div>
            <img class="ring-arrow" src="./images/F1.4.3戒指箭头.png" alt="">
          </div>

        </div>

        <!-- 跨卡浮动元素（基于 1920×1080 大画框给的坐标，已减去 panel inset 40） -->
        <img class="frame-arrow-2" src="./images/F1.2.2-箭头.png" alt="">
        <div class="frame-circle-2"></div>
        <img class="frame-arrow-3" src="./images/F1.3.3-Touchpad 1.0箭头.png" alt="">

        <!-- 底部导航 -->
        <div class="bottom-nav"><div class="nav-dot"></div></div>

      </div>
    </div>
  </div>

  <script>
    (function () {
      const canvas = document.getElementById("canvas");
      const BASE_W = 1920;
      const BASE_H = 1080;
      function updateScale() {
        const vw = Math.max(document.documentElement.clientWidth || 0, window.innerWidth || 0);
        const vh = Math.max(document.documentElement.clientHeight || 0, window.innerHeight || 0);
        const scale = Math.min(vw / BASE_W, vh / BASE_H);
        canvas.style.transform = "translate(-50%, -50%) scale(" + scale + ")";
      }
      window.addEventListener("resize", updateScale);
      updateScale();
    })();
  </script>
  <script src="../../shared/pages.js"></script>
  <script src="../../shared/nav.js"></script>
</body>
</html>
