<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>玩机手册</title>
<style>
@font-face { font-family: 'MiSans'; font-weight: 400; src: url('./fonts/MiSans-Regular.woff2') format('woff2'); font-display: optional; }
@font-face { font-family: 'MiSans'; font-weight: 500; src: url('./fonts/MiSans-Medium.woff2') format('woff2'); font-display: optional; }
@font-face { font-family: 'MiSans'; font-weight: 600; src: url('./fonts/MiSans-Semibold.woff2') format('woff2'); font-display: optional; }

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; height: 100%; background: #000; font-family: 'MiSans', -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif; -webkit-font-smoothing: antialiased; overflow: hidden; -webkit-text-size-adjust: 100%; text-size-adjust: 100%; }

.page { position: fixed; inset: 0; width: 100vw; height: 100vh; overflow: hidden; }
.canvas { position: absolute; left: 50%; top: 50%; width: 1920px; height: 1080px; transform-origin: center; background: #000; }

/* 背景大卡 */
.bg-panel { position: absolute; left: 40px; top: 40px; width: 1840px; height: 1000px; border-radius: 56px; border: 2px solid rgba(255,255,255,0.25); background: #f6f6f6 url('./images/Tutorial Content.png') center / cover no-repeat; overflow: hidden; }

/* 顶部胶囊 + 副提示 */
.top-pill { position: absolute; left: 120px; top: 120px; display: inline-flex; align-items: center; gap: 8px; padding: 17px 21px; background: rgba(255,255,255,0.8); border: 1px solid rgba(0,0,0,0.06); border-radius: 9999px; }
.top-pill .icon { width: 20px; height: 20px; display: inline-block; }
.top-pill .icon svg { width: 100%; height: 100%; display: block; }
.top-pill .label { font-size: 20px; font-weight: 400; color: #3978f3; line-height: 1; white-space: nowrap; }
.top-tip { position: absolute; left: 372px; top: 137px; font-size: 20px; font-weight: 400; color: #86868b; line-height: 20px; white-space: nowrap; }

/* 主标题 */
.title { position: absolute; left: 120px; top: 202px; }
.title h1 { font-size: 80px; font-weight: 500; color: #1d1d1f; line-height: 1.3; }
.title p { font-size: 28px; font-weight: 400; color: #6e6e73; line-height: 1.3; margin-top: 0; }

/* 卡片 */
.card { position: absolute; left: 120px; top: 383px; width: 540px; height: 560px; background: #fff; border-radius: 48px; overflow: hidden; cursor: pointer; transition: transform .25s ease; }
.card:hover { transform: translateY(-4px); }
.card .img-stack { position: relative; width: 540px; height: 320px; overflow: hidden; }
.card .img-stack img { position: absolute; left: 0; top: 0; width: 540px; height: 320px; object-fit: cover; display: block; }
.card .img-stack .layer-2 { z-index: 1; }
.card .img-stack .layer-1 { z-index: 2; width: 313px; height: 261px; left: 50%; top: 50%; transform: translate(-50%, -50%); object-fit: contain; }
.card .text { position: absolute; left: 40px; top: 360px; width: 460px; display: flex; flex-direction: column; gap: 16px; }
.card .text h2 { font-size: 40px; font-weight: 500; color: #1d1d1f; line-height: 1; white-space: nowrap; }
.card .text .desc { font-size: 24px; font-weight: 400; color: #000; opacity: 0.5; line-height: 1.4; width: 460px; }

/* ===== 手机端（≤480px）===== */
@media (max-width: 480px) {
  html, body { overflow-x: hidden; overflow-y: auto; height: auto; min-height: 100%; background: #000; }
  .page { position: static; width: 100%; height: auto; overflow: visible; }
  .canvas { position: relative; left: auto; top: auto; width: 100%; height: auto; transform: none !important; padding: 20px 16px 24px; background: transparent; min-height: 100vh; }

  /* 背景大卡：手机端铺满画面，无圆角无边距 */
  .bg-panel { position: fixed; left: 0; top: 0; right: 0; bottom: 0; width: 100%; height: 100%; border-radius: 0; border: 0; background: #f6f6f6 url('./images/Tutorial Content.png') center / cover no-repeat; z-index: 0; }

  /* 顶部胶囊 + 副提示：流式排列 */
  .top-pill { position: relative; left: auto; top: auto; padding: 8px 14px; gap: 6px; z-index: 2; }
  .top-pill .icon { width: 16px; height: 16px; }
  .top-pill .label { font-size: 14px; }
  .top-tip { display: none; }

  /* 主标题：流式 */
  .title { position: relative; left: auto; top: auto; margin-top: 12px; z-index: 2; padding-right: 16px; }
  .title h1 { font-size: 36px; line-height: 1.2; }
  .title p { font-size: 14px; margin-top: 8px; line-height: 1.5; }

  /* 卡片：单列、全宽、流式 */
  .card { position: relative; left: auto; top: auto; width: 100%; height: auto; margin-top: 16px; margin-bottom: 16px; border-radius: 24px; min-height: 44px; display: block; z-index: 2; text-decoration: none; color: inherit; }
  .card:hover { transform: none; }

  /* 图片区改为流式 block，用 aspect-ratio 自适应高度 */
  .card .img-stack { position: relative; width: 100%; height: auto; aspect-ratio: 540 / 320; overflow: hidden; }
  .card .img-stack .layer-2 { position: absolute; left: 0; top: 0; width: 100%; height: 100%; object-fit: cover; }
  .card .img-stack .layer-1 { position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); width: 58%; height: auto; max-height: 82%; object-fit: contain; }

  /* 文字区：流式 block，独立 padding */
  .card .text { position: relative; left: auto; top: auto; width: auto; padding: 16px 20px 20px; gap: 6px; display: flex; flex-direction: column; }
  .card .text h2 { font-size: 20px; white-space: normal; line-height: 1.3; }
  .card .text .desc { font-size: 14px; width: auto; line-height: 1.5; opacity: 0.55; }
}
</style>
</head>
<body>
<div class="page">
  <div class="canvas" id="canvas">

    <!-- 背景大卡 -->
    <div class="bg-panel"></div>

    <!-- 顶部胶囊 -->
    <div class="top-pill">
      <span class="icon">
        <svg viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M10 2.5L12.06 7.44L17.5 8.04L13.42 11.69L14.62 17.04L10 14.27L5.38 17.04L6.58 11.69L2.5 8.04L7.94 7.44L10 2.5Z" fill="#3978f3"/>
        </svg>
      </span>
      <span class="label">Power User Guide</span>
    </div>
    <div class="top-tip">· 三大核心场景/五种核心交互方式</div>

    <!-- 主标题 -->
    <div class="title">
      <h1>玩机手册</h1>
      <p>从娱乐、办公到游戏，AR 眼镜带来真正的空间体验，解锁空间智能的进阶秘籍。</p>
    </div>

    <!-- 卡片 -->
    <a class="card" href="./main-page.html">
      <div class="img-stack">
        <img class="layer-2" loading="lazy" decoding="async" src="./images/3.2.png" alt="">
        <img class="layer-1" loading="lazy" decoding="async" src="./images/3.1.png" alt="">
      </div>
      <div class="text">
        <h2>核心·五种交互方式</h2>
        <p class="desc">语音交互、TP01触控板多种交互方式</p>
      </div>
    </a>

  </div>
</div>

<script>
(function(){
  var canvas = document.getElementById('canvas');
  function fit(){
    var s = Math.min(window.innerWidth/1920, window.innerHeight/1080);
    canvas.style.transform = 'translate(-50%,-50%) scale(' + s + ')';
  }
  window.addEventListener('resize', fit, { passive: true });
  fit();
})();
</script>
</body>
</html>
